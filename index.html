<!DOCTYPE html>
<html lang="ja">
<head>

  <meta charset="UTF-8" />

  <title>化粧品検定 成分問題集</title>
  <style>
    :root {
      --bg: #fbecf8;
      --card: #ffffff;
      --card-soft: #fbecf8;
      --text: #1f1730;
      --subtext: #8f728e;
      --primary: #ff8cf0;
      --primary-strong: #ff6eec;
      --primary-soft: #fbecf8;
      --border: #eadcf2;
      --success: #16a39c;
      --success-soft: #dcfce7;
      --danger: #dc2626;
      --danger-soft: #fee2e2;
      --shadow: 0 12px 40px rgba(72, 35, 100, 0.08);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Hiragino Sans", "Yu Gothic UI", "Noto Sans JP", sans-serif;
      background: linear-gradient(180deg, #fbecf8 0%, #fbecf8 100%);
      color: var(--text);
    }

    .container {
      max-width: 1420px;
      margin: 0 auto;
      padding: 16px 20px 40px;
    }

    .header {
      margin-bottom: 16px;
    }

    .header h1 {
      margin: 0 0 8px;
      font-size: 32px;
    }

    .header p {
      margin: 0;
      color: var(--subtext);
      line-height: 1.8;
    }

    .card {
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(6px);
      border: 1px solid var(--border);
      border-radius: 34px;
      box-shadow: var(--shadow);
      padding: 28px;
      margin-bottom: 18px;
    }

    .tag {
      display: inline-block;
      background: var(--primary-soft);
      color: var(--primary-strong);
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .grid {
      display: grid;
      gap: 12px;
    }

    .stats-grid,
    .control-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    }

    .stat-box,
    .soft-box {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px 20px;
    }

    .stat-label {
      font-size: 14px;
      color: var(--subtext);
      margin-bottom: 10px;
    }

    .stat-value {
      font-size: 34px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.02em;
    }

    label {
      display: block;
      font-weight: 800;
      margin-bottom: 10px;
      font-size: 18px;
      color: var(--text);
    }

    select,
    input[type="number"],
    input[type="text"] {
      width: 100%;
      height: 60px;
      padding: 0 18px;
      border: 1px solid var(--border);
      border-radius: 18px;
      font-size: 18px;
      background: #fff;
      color: var(--text);
      outline: none;
    }

    select:focus,
    input[type="number"]:focus,
    input[type="text"]:focus {
      border-color: #ff9cea;
      box-shadow: 0 0 0 4px rgba(255, 156, 242, 0.16);
    }

    button {
      border: none;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary-strong), #ff47e0);
      color: white;
      box-shadow: 0 10px 24px rgba(255, 90, 241, 0.28);
    }

    .btn-secondary {
      background: #f7dfee;
      color: #f06fba;
    }

    .btn-ghost {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .hidden {
      display: none !important;
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      background: var(--card-soft);
      border-radius: 999px;
      overflow: hidden;
      margin: 14px 0 20px;
    }

    .progress-fill {
      height: 100%;
      background: var(--primary);
      width: 0%;
    }

    .choice-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      background: white;
      cursor: pointer;
    }

    .choice-item.selected {
      border-color: var(--primary);
      background: var(--primary-soft);
    }

    .choice-item.correct {
      background: var(--success-soft);
      border-color: #86efac;
    }

    .choice-item.incorrect {
      background: var(--danger-soft);
      border-color: #fca5a5;
    }

    .result-box.correct {
      background: var(--success-soft);
      color: var(--success);
      border: 1px solid #86efac;
    }

    .result-box.incorrect {
      background: var(--danger-soft);
      color: var(--danger);
      border: 1px solid #fca5a5;
    }

    .result-box {
      border-radius: 16px;
      padding: 16px;
      font-weight: 800;
      font-size: 20px;
    }

    .summary-item {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      background: var(--card-soft);
    }

    .summary-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .good {
      color: var(--success);
      font-weight: 800;
    }

    .bad {
      color: var(--danger);
      font-weight: 800;
    }

    .small {
      font-size: 13px;
      color: var(--subtext);
    }

    /* ホーム画面 */
    .home-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
      margin-bottom: 22px;
    }

    .home-title h2 {
      margin: 0 0 10px;
      font-size: 32px;
      font-weight: 800;
      color: #341628;
    }

    .home-title p {
      margin: 0;
      color: var(--subtext);
      line-height: 1.8;
      font-size: 15px;
    }

    .top-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .top-actions .btn-secondary,
    .top-actions .btn-ghost {
      min-width: 142px;
      height: 60px;
      font-size: 16px;
      padding: 0 24px;
    }

    .stats-grid-home {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 16px;
    }

.mode-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
  margin-bottom: 18px;
}
    .mode-card {
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 22px;
      padding: 20px 22px;
      cursor: pointer;
      transition: 0.2s ease;
      min-height: 104px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .mode-card.active {
      border: 2px solid #ff8ff0;
      background: linear-gradient(180deg, #fff 0%, #fbecf8 100%);
      box-shadow: 0 8px 18px rgba(255, 140, 245, 0.12);
    }

    .mode-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 10px;
      color: #361836;
    }

    .mode-desc {
      font-size: 14px;
      color: var(--subtext);
      line-height: 1.7;
    }

    .home-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      align-items: end;
      margin-bottom: 14px;
    }
    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
    }

    .chip {
      border: 1px solid var(--border);
      background: #fff;
      color: #765773;
      border-radius: 999px;
      padding: 11px 18px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .chip.active {
      background: #fbecf8;
      color: #f869ec;
      border-color: #ffb8ff;
    }

    .home-bottom-actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
    }

    .home-bottom-actions .btn-primary,
    .home-bottom-actions .btn-secondary {
      height: 58px;
      padding: 0 24px;
      font-size: 16px;
    }

    .match-count {
      color: var(--subtext);
      font-size: 14px;
      font-weight: 700;
    }

    .hidden-control {
      display: none !important;
    }

@media (max-width: 1100px) {
  .stats-grid-home,
  .mode-grid,
  .home-form-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (max-width: 760px) {
  .container {
    padding: 12px;
  }

  .card {
    padding: 18px;
    border-radius: 24px;
  }

  .home-top {
    flex-direction: column;
    align-items: stretch;
  }

  .top-actions {
    justify-content: flex-start;
  }

  .stats-grid-home,
  .mode-grid,
  .home-form-grid {
    grid-template-columns: 1fr;
  }

  .home-title h2 {
    font-size: 26px;
  }

  .stat-value {
    font-size: 28px;
  }

  select,
  input[type="number"],
  input[type="text"] {
    height: 54px;
    font-size: 16px;
  }

  /* ←ここにヘッダー追加 */
  .hero-banner {
    margin-bottom: 16px;
  }

  .hero-banner-img {
    border-radius: 16px;
  }
}

/* PC共通（ここはそのまま） */
.hero-banner {
  width: 100%;
  display: flex;
  justify-content: center;
  margin: 0 0 20px;
  overflow: hidden;
}

.hero-banner-img {
  width: 100%;
  max-width: 1100px;
  height: auto;
  display: block;
  border-radius: 20px;

}
  </style>

  <div class="container">
    <div class="header">

  <img src="header.jpg" alt="化粧品検定2級 成分問題集 ヘッダー" class="hero-banner-img">
</section>
      <p>

      </p>

    <section id="home-screen" class="card">

          <button class="btn-ghost" id="reset-btn">履歴リセット</button>
        </div>
      </div>

      <div class="stats-grid-home" id="home-stats"></div>

    <div class="mode-grid">

    <div class="home-form-grid">

      <div class="chip-row" id="category-chips"></div>

    <section id="quiz-screen" class="card hidden">
      <div style="display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; align-items:center;">
        <div>

          <div class="small" id="quiz-counter"></div>

      <h2 id="quiz-question" style="line-height:1.7;"></h2>

      <div id="choices-container" class="grid"></div>

      <div class="button-row" style="margin-top:16px;">
        <button class="btn-primary" id="submit-btn">回答する</button>
      </div>
    </section>

    <section id="result-screen" class="card hidden">
      <div id="result-box" class="result-box"></div>
      <div style="margin-top:16px;">
        <div class="tag" id="result-category"></div>
        <h2 id="result-question" style="line-height:1.7;"></h2>
      </div>

      <div class="control-grid">
        <div class="soft-box">

      <div class="button-row" style="margin-top:16px;">

    ];

    const state = {
      progress: loadProgress(),
      currentScreen: "home",
    setup: {
      mode: "random",
      categories: [],
      count: 10,
      keyword: ""
    },
      session: {
        questions: [],
        currentIndex: 0,
        answers: [],
      },
      selected: [],
      lastResult: null,
    };

    function validateQuestions() {
      const ids = new Set();
      for (const q of QUESTIONS) {
        if (ids.has(q.id)) throw new Error("Duplicate id: " + q.id);
        ids.add(q.id);
        if (!Array.isArray(q.choices) || q.choices.length < 2) throw new Error("choices invalid: " + q.id);
        if (!Array.isArray(q.answer) || q.answer.length < 1) throw new Error("answer invalid: " + q.id);
        for (const a of q.answer) {
          if (a < 1 || a > q.choices.length) throw new Error("answer out of range: " + q.id);
        }
      }
    }

    function loadProgress() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return { history: [] };
        return JSON.parse(raw);
      } catch {
        return { history: [] };
      }
    }

    function saveProgress() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.progress));
    }

    function shuffle(array) {
      const cloned = [...array];
      for (let i = cloned.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [cloned[i], cloned[j]] = [cloned[j], cloned[i]];
      }
      return cloned;
    }

    function sameArraySet(a, b) {
      if (a.length !== b.length) return false;
      const aa = [...a].sort((x, y) => x - y);
      const bb = [...b].sort((x, y) => x - y);
      return aa.every((v, i) => v === bb[i]);
    }

    function categories() {
      return [...new Set(QUESTIONS.map(q => q.category || "未分類"))].sort((a, b) => a.localeCompare(b, "ja"));
    }

    function getStats() {
      const total = state.progress.history.length;
      const correct = state.progress.history.filter(h => h.is_correct).length;
      const byCategory = {};
      const idToCategory = Object.fromEntries(QUESTIONS.map(q => [q.id, q.category || "未分類"]));

      for (const h of state.progress.history) {
        const cat = idToCategory[h.id] || "未分類";
        if (!byCategory[cat]) byCategory[cat] = { n: 0, c: 0 };
        byCategory[cat].n += 1;
        if (h.is_correct) byCategory[cat].c += 1;
      }

      return { total, correct, byCategory };
    }

function filteredPool() {
  let pool = [...QUESTIONS];
  const keyword = (state.setup.keyword || "").trim().toLowerCase();

  // カテゴリ絞り込み
  // categories が空なら ALL扱い
  if (state.setup.categories.length > 0) {
    pool = pool.filter(q => state.setup.categories.includes(q.category));
  }

  // 間違い復習モード
  if (state.setup.mode === "wrong_only") {
    const wrongIds = new Set(
      state.progress.history.filter(h => !h.is_correct).map(h => h.id)
    );
    pool = pool.filter(q => wrongIds.has(q.id));
  }

  // キーワード検索
  if (keyword) {
    pool = pool.filter(q => {
      const text = [
        q.category,
        q.question,
        ...(q.choices || []),
        q.explanation || ""
      ].join(" ").toLowerCase();
      return text.includes(keyword);
    });
  }

  return pool;
}

    function pickQuestions() {
      return shuffle(filteredPool()).slice(0, Math.max(1, Math.min(100, Number(state.setup.count) || 1)));
    }

    function showScreen(name) {
      const screens = ["home-screen", "quiz-screen", "result-screen", "summary-screen", "stats-screen"];
      for (const id of screens) {
        document.getElementById(id).classList.add("hidden");
      }
      document.getElementById(name + "-screen").classList.remove("hidden");
      state.currentScreen = name;
    }

function renderModeCards() {
  document.querySelectorAll(".mode-card").forEach(card => {
    card.classList.toggle("active", card.dataset.mode === state.setup.mode);
  });
  document.getElementById("mode-select").value = state.setup.mode;
}

function renderCategoryChips() {
  const area = document.getElementById("category-chips");
  const list = categories();
  area.innerHTML = "";

  // ALLボタン
  const allBtn = document.createElement("button");
  allBtn.className = "chip" + (state.setup.categories.length === 0 ? " active" : "");
  allBtn.textContent = "ALL";
  allBtn.type = "button";
  allBtn.addEventListener("click", () => {
    state.setup.categories = [];
    renderCategoryChips();
    updateMatchCount();
  });
  area.appendChild(allBtn);

  // 各カテゴリボタン
  list.forEach(cat => {
    const btn = document.createElement("button");
    const isActive = state.setup.categories.includes(cat);

    btn.className = "chip" + (isActive ? " active" : "");
    btn.textContent = cat;
    btn.type = "button";

    btn.addEventListener("click", () => {
      // ALL状態から1個選ぶ
      if (state.setup.categories.length === 0) {
        state.setup.categories = [cat];
      } else {
        if (state.setup.categories.includes(cat)) {
          state.setup.categories = state.setup.categories.filter(v => v !== cat);
        } else {
          state.setup.categories.push(cat);
        }
      }

      // 全解除されたらALL扱い
      if (state.setup.categories.length === 0) {
        state.setup.categories = [];
      }

      renderCategoryChips();
      updateMatchCount();
    });

    area.appendChild(btn);
  });
}

    function updateMatchCount() {
      const n = filteredPool().length;
      document.getElementById("match-count-text").textContent = `条件一致：${n}問`;
    }

function renderHome() {
  const stats = getStats();
  const homeStats = document.getElementById("home-stats");
  const accuracy = stats.total === 0 ? "-" : ((stats.correct / stats.total) * 100).toFixed(1) + "%";

  homeStats.innerHTML = `
    <div class="stat-box"><div class="stat-label">登録問題数</div><div class="stat-value">${QUESTIONS.length}</div></div>
    <div class="stat-box"><div class="stat-label">総回答数</div><div class="stat-value">${stats.total}</div></div>
    <div class="stat-box"><div class="stat-label">累計正解数</div><div class="stat-value">${stats.correct}</div></div>
    <div class="stat-box"><div class="stat-label">正答率</div><div class="stat-value">${accuracy}</div></div>
  `;

  document.getElementById("count-input").value = state.setup.count;
  document.getElementById("search-input").value = state.setup.keyword || "";

  renderModeCards();
  renderCategoryChips();
  updateMatchCount();
}

    function renderQuiz() {
      const q = state.session.questions[state.session.currentIndex];
      if (!q) return;

      document.getElementById("quiz-category").textContent = q.category;
      document.getElementById("quiz-counter").textContent = `${state.session.currentIndex + 1} / ${state.session.questions.length}`;
      document.getElementById("quiz-question").textContent = q.question;
      document.getElementById("progress-fill").style.width = `${((state.session.currentIndex + 1) / state.session.questions.length) * 100}%`;

      const choicesContainer = document.getElementById("choices-container");
      choicesContainer.innerHTML = "";

      q.choices.forEach((choice, index) => {
        const number = index + 1;
        const item = document.createElement("label");
        item.className = "choice-item" + (state.selected.includes(number) ? " selected" : "");
        item.innerHTML = `
          <input type="checkbox" ${state.selected.includes(number) ? "checked" : ""} />
          <div><strong>${number}.</strong> ${choice}</div>
        `;
        item.addEventListener("click", (e) => {
          e.preventDefault();
          toggleChoice(number);
        });
        choicesContainer.appendChild(item);
      });

      document.getElementById("submit-btn").disabled = state.selected.length === 0;
    }

    function toggleChoice(number) {
      if (state.selected.includes(number)) {
        state.selected = state.selected.filter(v => v !== number);
      } else {
        state.selected.push(number);
        state.selected.sort((a, b) => a - b);
      }
      renderQuiz();
    }

    function submitAnswer() {
      const q = state.session.questions[state.session.currentIndex];
      const selected = [...state.selected].sort((a, b) => a - b);
      const correct = [...q.answer].sort((a, b) => a - b);
      const isCorrect = sameArraySet(selected, correct);

      state.progress.history.push({
        time: new Date().toISOString(),
        id: q.id,
        category: q.category,
        chosen: selected,
        answer: correct,
        is_correct: isCorrect,
      });
      saveProgress();

      state.lastResult = { question: q, selected, correct, isCorrect };
      state.session.answers.push(state.lastResult);
      renderResult();
      showScreen("result");
    }

    function renderResult() {
      const r = state.lastResult;
      if (!r) return;

      const resultBox = document.getElementById("result-box");
      resultBox.className = "result-box " + (r.isCorrect ? "correct" : "incorrect");
      resultBox.textContent = r.isCorrect ? "✅ 正解！" : "❌ 不正解";

      document.getElementById("result-category").textContent = r.question.category;
      document.getElementById("result-question").textContent = r.question.question;
      document.getElementById("your-answer").textContent = r.selected.length ? r.selected.join(", ") : "未回答";
      document.getElementById("correct-answer").textContent = r.correct.join(", ");

      const resultChoices = document.getElementById("result-choices");
      resultChoices.innerHTML = "";
      r.question.choices.forEach((choice, idx) => {
        const number = idx + 1;
        const div = document.createElement("div");
        let cls = "choice-item";
        if (r.correct.includes(number)) cls += " correct";
        else if (r.selected.includes(number)) cls += " incorrect";
        div.className = cls;
        div.innerHTML = `<div><strong>${number}.</strong> ${choice}</div>`;
        resultChoices.appendChild(div);
      });

      const explanationBox = document.getElementById("explanation-box");
      if (r.question.explanation && r.question.explanation.trim()) {
        explanationBox.classList.remove("hidden");
        document.getElementById("result-explanation").textContent = r.question.explanation;
      } else {
        explanationBox.classList.add("hidden");
      }

      const isLast = state.session.currentIndex >= state.session.questions.length - 1;
      document.getElementById("next-btn").textContent = isLast ? "結果を見る" : "次へ";
    }

    function nextStep() {
      const isLast = state.session.currentIndex >= state.session.questions.length - 1;
      if (isLast) {
        renderSummary();
        showScreen("summary");
      } else {
        state.session.currentIndex += 1;
        state.selected = [];
        renderQuiz();
        showScreen("quiz");
      }
    }

    function renderSummary() {
      const total = state.session.questions.length;
      const correct = state.session.answers.filter(a => a.isCorrect).length;
      const accuracy = total === 0 ? 0 : ((correct / total) * 100);

      document.getElementById("summary-text").textContent = `${total}問中 ${correct}問正解（正答率 ${accuracy.toFixed(1)}%）`;
      document.getElementById("summary-stats").innerHTML = `
        <div class="stat-box"><div class="stat-label">出題数</div><div class="stat-value">${total}</div></div>
        <div class="stat-box"><div class="stat-label">正解数</div><div class="stat-value">${correct}</div></div>
        <div class="stat-box"><div class="stat-label">不正解数</div><div class="stat-value">${total - correct}</div></div>
        <div class="stat-box"><div class="stat-label">正答率</div><div class="stat-value">${accuracy.toFixed(1)}%</div></div>
      `;

      const list = document.getElementById("summary-list");
      list.innerHTML = "";
      state.session.answers.forEach((a, index) => {
        const item = document.createElement("div");
        item.className = "summary-item";
        item.innerHTML = `
          <div class="summary-top">
            <div><strong>${index + 1}. ${a.question.question}</strong></div>
            <div class="${a.isCorrect ? "good" : "bad"}">${a.isCorrect ? "正解" : "不正解"}</div>
          </div>
          <div class="small" style="margin-top:8px;">あなた: ${a.selected.length ? a.selected.join(", ") : "未回答"} ／ 正解: ${a.correct.join(", ")}</div>
        `;
        list.appendChild(item);
      });
    }

    function renderStats() {
      const stats = getStats();
      const accuracy = stats.total === 0 ? 0 : (stats.correct / stats.total) * 100;
      document.getElementById("stats-top").innerHTML = `
        <div class="stat-box"><div class="stat-label">総回答数</div><div class="stat-value">${stats.total}</div></div>
        <div class="stat-box"><div class="stat-label">総正解数</div><div class="stat-value">${stats.correct}</div></div>
        <div class="stat-box"><div class="stat-label">総不正解数</div><div class="stat-value">${stats.total - stats.correct}</div></div>
        <div class="stat-box"><div class="stat-label">総正答率</div><div class="stat-value">${accuracy.toFixed(1)}%</div></div>
      `;

      const area = document.getElementById("category-stats");
      area.innerHTML = "";
      const entries = Object.entries(stats.byCategory).sort((a, b) => a[0].localeCompare(b[0], "ja"));

      if (entries.length === 0) {
        area.innerHTML = `<div class="small">まだ成績データがないよ。まずは解いてみよう。</div>`;
        return;
      }

      entries.forEach(([cat, value]) => {
        const pct = value.n === 0 ? 0 : (value.c / value.n) * 100;
        const box = document.createElement("div");
        box.className = "soft-box";
        box.innerHTML = `
          <div style="display:flex; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:8px;">
            <strong>${cat}</strong>
            <span>${value.c}/${value.n} (${pct.toFixed(1)}%)</span>
          </div>
          <div class="progress-bar" style="margin:0; height:8px; background:white; border:1px solid var(--border);">
            <div class="progress-fill" style="width:${pct}%;"></div>
          </div>
        `;
        area.appendChild(box);
      });
    }

function startQuiz() {
  state.setup.mode = document.getElementById("mode-select").value;
  state.setup.count = Number(document.getElementById("count-input").value) || 10;
  state.setup.keyword = document.getElementById("search-input").value.trim();

  const picked = pickQuestions();
  if (picked.length === 0) {
    alert("出題できる問題がないよ。条件をゆるめるか、復習モードの履歴を確認してね。");
    return;
  }

  state.session.questions = picked;
  state.session.currentIndex = 0;
  state.session.answers = [];
  state.selected = [];
  state.lastResult = null;
  renderQuiz();
  showScreen("quiz");
}

    function resetProgress() {
      if (!confirm("履歴を全部リセットする？")) return;
      state.progress = { history: [] };
      saveProgress();
      renderHome();
      showScreen("home");
    }

function initEvents() {
  document.querySelectorAll(".mode-card").forEach(card => {
    card.addEventListener("click", () => {
      state.setup.mode = card.dataset.mode;
      renderModeCards();
      updateMatchCount();
    });
  });

  document.getElementById("count-input").addEventListener("input", (e) => {
    state.setup.count = Number(e.target.value) || 10;
  });

  document.getElementById("search-input").addEventListener("input", (e) => {
    state.setup.keyword = e.target.value;
    updateMatchCount();
  });

  document.getElementById("preview-btn").addEventListener("click", () => {
    updateMatchCount();
    alert(`条件に合う問題は ${filteredPool().length} 問あります。`);
  });

  document.getElementById("start-btn").addEventListener("click", startQuiz);
  document.getElementById("submit-btn").addEventListener("click", submitAnswer);
  document.getElementById("next-btn").addEventListener("click", nextStep);

  document.getElementById("show-stats-btn").addEventListener("click", () => {
    renderStats();
    showScreen("stats");
  });

  document.getElementById("reset-btn").addEventListener("click", resetProgress);

  ["back-home-btn-1", "back-home-btn-2", "back-home-btn-3", "back-home-btn-4"].forEach(id => {
    document.getElementById(id).addEventListener("click", () => {
      renderHome();
      showScreen("home");
    });
  });
}

    validateQuestions();
    initEvents();
    renderHome();
    showScreen("home");
  </script>
